version: 2
project_name: isthmos

before:
  hooks:
    - go mod tidy

builds:
  - id: isthmos
    main: ./cmd/isthmos
    binary: isthmos
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - LICENSE
      - README.md
      - rules.example.json

checksum:
  name_template: checksums.txt

sboms:
  - id: archive
    artifacts: archive

# keyless (OIDC) cosign signing; needs cosign on PATH and id-token: write in CI.
# cosign v2+ emits a single bundle (signature + certificate); verify with --bundle.
signs:
  - cmd: cosign
    artifacts: checksum
    output: true
    signature: "${artifact}.bundle"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"

brews:
  - name: isthmos
    repository:
      owner: sphragis-oss
      name: homebrew-sphragis
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/sphragis-oss/isthmos
    description: "Local context-compression layer for agent tool outputs"
    license: "Apache-2.0"

release:
  github:
    owner: sphragis-oss
    name: isthmos
