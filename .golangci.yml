version: "2"

linters:
  enable:
    - gosec
  settings:
    gosec:
      excludes:
        - G301 # state and config dirs are deliberately 0755/0644 same-user files
        - G302
        - G304 # the rules file path is user-supplied by design (ISTHMOS_RULES)
        - G306
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
